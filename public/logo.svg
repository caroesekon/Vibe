<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="vibeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#vibeGrad)" />
  
  <!-- V letter -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle">V</text>
  
  <!-- Small accent dots -->
  <circle cx="55" cy="55" r="8" fill="white" opacity="0.4" />
  <circle cx="150" cy="65" r="5" fill="white" opacity="0.3" />
  <circle cx="45" cy="120" r="4" fill="white" opacity="0.3" />
</svg>